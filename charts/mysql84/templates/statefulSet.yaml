kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: mysql
spec:
  serviceName: mysql
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: mysql
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: mysql
        release: {{ .Release.Name }}
    spec:
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
  {{- if .Values.deployment.imagePullSecrets }}
      imagePullSecrets:
      - name: {{ .Values.deployment.imagePullSecrets }}
  {{- end }}
      affinity:
{{ toYaml .Values.deployment.affinity | indent 8 }}
      nodeSelector:
{{ toYaml .Values.deployment.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.deployment.tolerations | indent 8 }}
      containers:
      - name: mysql
        image: {{ .Values.deployment.dockerRegistry }}/percona/percona-server:{{ .Values.deployment.containerVersion }}
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: fKX8oqg68Rd7Q9xy9ea56u7WIkg=86
        ports:
        - containerPort: 3306
          protocol: TCP
{{- if .Values.persistent }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
{{- end }}
        terminationMessagePolicy: File
{{- if .Values.persistent }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mysql-data
{{- end }}
